<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Reports</title>
  <link rel="stylesheet" href="../../css/billCss/BillReport.css">
</head>
<body>

<div clss="report-body">
<!-- Navbar -->
  <nav class="navbar-bill-report">
    <div class="nav-logo-bill-report">
      <svg class="logo-icon-bill-report" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="3" x2="9" y2="21"></line>
      </svg>
      Bill & Event Reminder
    </div>
    <ul class="nav-links-bill-report">
      <li><a href="./billDashboard.html" class="nav-link-bill-report">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Dashboard
      </a></li>
    </ul>
  </nav>

  <div class="container-bill-report">
    <!-- Page Header -->
    <div class="header-section-bill-report">
      <div class="title-wrapper-bill-report">
        <div class="icon-wrapper-bill-report">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <h1 class="page-title-bill-report">Bill Reports</h1>
      </div>
      <p class="subtitle-bill-report">Generate comprehensive reports for your bills and expenses</p>
    </div>

    <!-- Filters Card -->
    <div class="card-bill-report filters-card-bill-report">
      <h3 class="card-title-bill-report">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
        </svg>
        Filter Options
      </h3>

      <div class="filters-grid-bill-report">
        <div class="filter-group-bill-report">
          <label for="reportCategory" class="filter-label-bill-report">Category</label>
          <div class="select-wrapper-bill-report">
            <select id="reportCategory" class="filter-select-bill-report">
              <option value="all">All Categories</option>
              <option value="electricity">⚡ Electricity</option>
              <option value="water">💧 Water</option>
              <option value="rent">🏠 Rent</option>
              <option value="internet">🌐 Internet</option>
              <option value="other">📦 Other</option>
            </select>
          </div>
        </div>

        <div class="filter-group-bill-report">
          <label for="reportStatus" class="filter-label-bill-report">Status</label>
          <div class="select-wrapper-bill-report">
            <select id="reportStatus" class="filter-select-bill-report">
              <option value="all">All Status</option>
              <option value="paid">✓ Paid</option>
              <option value="unpaid">⏱ Unpaid</option>
            </select>
          </div>
        </div>

        <div class="filter-group-bill-report">
          <label for="reportDate" class="filter-label-bill-report">Due Before</label>
          <input type="date" id="reportDate" class="filter-input-bill-report">
        </div>

        <div class="filter-group-bill-report">
          <label for="reportType" class="filter-label-bill-report">Report Type</label>
          <div class="select-wrapper-bill-report">
            <select id="reportType" class="filter-select-bill-report">
              <option value="monthly">📅 Monthly Report</option>
              <option value="annual">📊 Annual Report</option>
            </select>
          </div>
        </div>

        <div class="filter-group-bill-report">
          <label for="reportMonth" class="filter-label-bill-report">Select Month</label>
          <input type="month" id="reportMonth" class="filter-input-bill-report">
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="actions-bill-report">
        <button class="btn-bill-report generate-btn-bill-report" id="generateReportBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          Generate Report
        </button>
        <button class="btn-bill-report download-btn-bill-report" id="downloadReportBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download PDF
        </button>
      </div>
    </div>

    <!-- Report Output -->
    <div class="card-bill-report output-card-bill-report">
      <div id="reportOutput" class="report-output-bill-report">
        <div class="empty-state-bill-report">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          <h3>No Report Generated Yet</h3>
          <p>Select your filters and click "Generate Report" to view your bill summary</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../../js/billJs/billReport.js"></script>
</body>
</html>
